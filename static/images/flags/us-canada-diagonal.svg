<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 40" role="img" aria-label="US and Canada diagonal flag">
  <defs>
    <clipPath id="upper-half">
      <polygon points="0,0 60,0 0,40" />
    </clipPath>
    <clipPath id="lower-half">
      <polygon points="60,40 60,0 0,40" />
    </clipPath>
  </defs>

  <rect width="60" height="40" fill="#b22234" clip-path="url(#upper-half)" />
  <rect y="4" width="60" height="4" fill="#ffffff" clip-path="url(#upper-half)" />
  <rect y="12" width="60" height="4" fill="#ffffff" clip-path="url(#upper-half)" />
  <rect y="20" width="60" height="4" fill="#ffffff" clip-path="url(#upper-half)" />
  <rect y="28" width="60" height="4" fill="#ffffff" clip-path="url(#upper-half)" />
  <rect y="36" width="60" height="4" fill="#ffffff" clip-path="url(#upper-half)" />
  <rect width="24" height="20" fill="#3c3b6e" clip-path="url(#upper-half)" />

  <rect width="60" height="40" fill="#ffffff" clip-path="url(#lower-half)" />
  <rect width="14" height="40" fill="#d80621" clip-path="url(#lower-half)" />
  <rect x="46" width="14" height="40" fill="#d80621" clip-path="url(#lower-half)" />
  <polygon
    points="30,10 33,16 39,15 35,20 38,27 32,24 30,30 28,24 22,27 25,20 21,15 27,16"
    fill="#d80621"
    clip-path="url(#lower-half)"
  />

  <line x1="0" y1="40" x2="60" y2="0" stroke="#ffffff" stroke-width="1.4" />
</svg>
